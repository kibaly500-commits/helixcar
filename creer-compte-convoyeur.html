<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HelixCar — Créer mon compte convoyeur</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0; font-family: 'DM Sans', sans-serif; background: #0A1628;
    min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px;
  }
  .box {
    background: #FAFAF7; border-radius: 16px; padding: 36px 32px; max-width: 420px; width: 100%;
    box-shadow: 0 20px 60px rgba(0,0,0,.3);
  }
  .logo { display:flex; align-items:center; gap:10px; font-family:'Syne',sans-serif; font-weight:800; font-size:1.3rem; margin-bottom: 18px; }
  .logo-badge { background:#F5C518; color:#0D0D0D; width:34px; height:34px; border-radius:8px; display:flex; align-items:center; justify-content:center; font-weight:800; }
  h2 { font-family:'Syne',sans-serif; margin: 0 0 6px; font-size: 1.3rem; }
  p.sub { color:#666; font-size:.88rem; margin: 0 0 22px; line-height:1.5; }
  .form-group { margin-bottom: 14px; }
  label { display:block; font-size:.8rem; font-weight:600; margin-bottom: 5px; color:#333; }
  input {
    width:100%; padding:11px 13px; border:1.5px solid #ddd; border-radius:9px;
    font-family:inherit; font-size:.9rem; outline:none;
  }
  input:focus { border-color:#2556A8; }
  input[readonly] { background:#f0efe9; color:#666; }
  .btn {
    width:100%; padding:13px; border:none; border-radius:9px; background:#0D0D0D; color:#fff;
    font-weight:700; font-size:.92rem; cursor:pointer; margin-top:6px;
  }
  .btn:disabled { opacity:.6; cursor:default; }
  .alert { border-radius:9px; padding:12px 14px; font-size:.83rem; margin-top:14px; display:none; }
  .alert-error { background:rgba(239,68,68,.1); color:#C2410C; border:1.5px solid rgba(239,68,68,.3); }
  .alert-success { background:rgba(34,197,94,.1); color:#166534; border:1.5px solid rgba(34,197,94,.3); }
  .hint { font-size:.75rem; color:#888; margin-top:4px; }
</style>
</head>
<body>

<div class="box">
  <div class="logo"><div class="logo-badge">HC</div> HelixCar</div>
  <h2>Créer mon compte convoyeur</h2>
  <p class="sub">Ton dossier est validé ! Choisis un mot de passe pour accéder à ton espace convoyeur et voir les missions disponibles.</p>

  <div id="form-zone">
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="cc-email" placeholder="ton@email.com">
    </div>
    <div class="form-group">
      <label>Mot de passe</label>
      <input type="password" id="cc-pw" placeholder="8 caractères minimum">
      <div class="hint">Minimum 8 caractères.</div>
    </div>
    <div class="form-group">
      <label>Confirmer le mot de passe</label>
      <input type="password" id="cc-pw2" placeholder="••••••••" onkeydown="if(event.key==='Enter')creerCompte()">
    </div>
    <button class="btn" id="cc-btn" onclick="creerCompte()">Créer mon compte →</button>
  </div>

  <div id="cc-error" class="alert alert-error"></div>
  <div id="cc-success" class="alert alert-success"></div>
</div>

<script>
const SUPABASE_URL = 'https://zsetmqnmmupqbkgqbjbo.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpzZXRtcW5tbXVwcWJrZ3FiamJvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEzNjI4OTgsImV4cCI6MjA5NjkzODg5OH0.wpxgmRXpoa6BI9P9Ybu6OXwmK9x6mPU3dxpiwf11gFc';
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// Pré-remplit l'email depuis le lien reçu par email : creer-compte-convoyeur.html?email=xxx
(function() {
  var params = new URLSearchParams(window.location.search);
  var email = params.get('email');
  if (email) {
    var emailInput = document.getElementById('cc-email');
    emailInput.value = email;
    emailInput.readOnly = true;
  }
})();

function showError(msg) {
  var el = document.getElementById('cc-error');
  el.textContent = msg;
  el.style.display = 'block';
  document.getElementById('cc-success').style.display = 'none';
}

async function creerCompte() {
  var email = document.getElementById('cc-email').value.trim();
  var pw = document.getElementById('cc-pw').value;
  var pw2 = document.getElementById('cc-pw2').value;
  var btn = document.getElementById('cc-btn');

  if (!email) { showError('Merci de renseigner ton email.'); return; }
  if (pw.length < 8) { showError('Le mot de passe doit contenir au moins 8 caractères.'); return; }
  if (pw !== pw2) { showError('Les mots de passe ne correspondent pas.'); return; }

  // Vérifie que cet email correspond bien à un convoyeur validé
  btn.disabled = true; btn.textContent = 'Vérification…';
  try {
    var checkResp = await fetch(SUPABASE_URL + '/rest/v1/convoyeurs?email=eq.' + encodeURIComponent(email) + '&select=id,statut,prenom', {
      headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY }
    });
    var rows = await checkResp.json();
    if (!rows || rows.length === 0) {
      showError('Aucun dossier convoyeur trouvé avec cet email. Vérifie l\'adresse ou contacte HelixCar.');
      btn.disabled = false; btn.textContent = 'Créer mon compte →';
      return;
    }
    if (rows[0].statut !== 'actif') {
      showError('Ton dossier n\'est pas encore validé par l\'équipe HelixCar. Réessaie une fois validé.');
      btn.disabled = false; btn.textContent = 'Créer mon compte →';
      return;
    }
  } catch (e) {
    showError('Erreur de vérification (voir la console).');
    console.error(e);
    btn.disabled = false; btn.textContent = 'Créer mon compte →';
    return;
  }

  btn.textContent = 'Création du compte…';
  try {
    var result = await sb.auth.signUp({ email: email, password: pw });
    if (result.error) {
      showError('Erreur : ' + result.error.message);
      btn.disabled = false; btn.textContent = 'Créer mon compte →';
      return;
    }
    document.getElementById('form-zone').style.display = 'none';
    var successEl = document.getElementById('cc-success');
    successEl.innerHTML = '✅ Compte créé ! Si une confirmation par email t\'est demandée, vérifie ta boîte mail. Sinon, tu peux te connecter directement sur ton espace convoyeur.';
    successEl.style.display = 'block';
  } catch (e) {
    showError('Erreur inattendue (voir la console).');
    console.error(e);
    btn.disabled = false; btn.textContent = 'Créer mon compte →';
  }
}
</script>

</body>
</html>
